name: Bug Report
description: Report a reproducible problem in Kizunu
title: ''
labels: ['bug']
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
      placeholder: A clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact steps needed to reproduce the problem.
      placeholder: |
        1. Configure ...
        2. Trigger ...
        3. See error ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: What actually happened?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: Kizunu commit SHA or release tag.
      placeholder: e.g., commit abc1234
    validations:
      required: true
  - type: textarea
    id: env
    attributes:
      label: Environment
      description: Bun version, Node version, OS, and any relevant channel plugin / CRM connector.
      placeholder: |
        - Bun: 1.3.13
        - Node: 22.x
        - OS: macOS 14.5
        - Channel: Evolution
        - CRM: Pipedrive
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste relevant logs, errors, or screenshots.
      render: shell
  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues first.
          required: true
        - label: I am not reporting a security vulnerability (see SECURITY.md).
          required: true
