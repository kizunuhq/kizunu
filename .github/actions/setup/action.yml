name: Setup
description: Install Node 22, Bun, restore install cache, and install dependencies (frozen lockfile, no postinstall scripts).

runs:
  using: composite
  steps:
    # Node 22 is required by Vite to load TypeScript config files
    # (`vite.config.ts`). Bun is the primary runtime, but the lint
    # pipeline shells into vite-plus which depends on Node's loader.
    - uses: actions/setup-node@v6
      with:
        node-version: '22'

    - uses: oven-sh/setup-bun@v2
      with:
        bun-version: 1.3.13

    # Cache Bun's global install cache. Invalidated when bun.lock changes;
    # restore-keys cover branch/main fallbacks.
    - name: Restore Bun install cache
      uses: actions/cache@v5
      with:
        path: ~/.bun/install/cache
        key: bun-install-${{ runner.os }}-${{ hashFiles('bun.lock') }}
        restore-keys: |
          bun-install-${{ runner.os }}-

    # --ignore-scripts: the simple-git-hooks postinstall script assumes
    # the classic npm node_modules layout and fails on Bun's isolated
    # layout (.bun/<pkg>@<ver>/...). CI does not need git hooks.
    - name: Install dependencies
      shell: bash
      run: bun install --frozen-lockfile --ignore-scripts
