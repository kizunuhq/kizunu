name: Coverage summary
description: Extract the coverage summary from a test run's captured output and upload it as an artifact.

inputs:
  name:
    description: Artifact name (e.g. unit-coverage)
    required: true

runs:
  using: composite
  steps:
    - name: Extract coverage summary
      shell: bash
      # The v8 text reporter prints the `All files` totals row right after the
      # table header (no "Coverage summary" footer under --reporter
      # github-actions). Capture header → All files; strip any ANSI codes.
      run: awk '/% Stmts/{p=1} p; /^All files/{exit}' coverage-summary.txt | sed 's/\x1b\[[0-9;]*m//g' > coverage-table.txt || true

    - name: Upload coverage artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.name }}
        path: |
          coverage-summary.txt
          coverage-table.txt
        if-no-files-found: ignore
