name: Deps outdated

# Weekly audit of outdated runtime dependencies. Dependabot (dependabot.yml)
# only covers GitHub Actions here — Bun workspaces + catalog are not well served
# by it — so this keeps a single tracking issue updated from `bun outdated`,
# closing it when everything is current.

on:
  schedule:
    - cron: '0 12 * * 1' # Mondays 12:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  outdated:
    name: Audit outdated deps
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GH_TOKEN: ${{ github.token }}
      ISSUE_TITLE: 'chore(deps): weekly outdated audit'
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup

      - name: Run bun outdated
        id: outdated
        shell: bash
        run: |
          bun outdated --filter '*' > outdated.txt 2>&1 || true
          # With no outdated deps Bun still prints a header; treat <5 lines as empty.
          if [ "$(wc -l < outdated.txt)" -lt 5 ]; then
            echo "empty=true" >> "$GITHUB_OUTPUT"
          else
            echo "empty=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build issue body
        if: steps.outdated.outputs.empty == 'false'
        shell: bash
        run: |
          # Plain text only (no markdown backticks) so shellcheck stays quiet
          # (SC2016 fires on backticks/$ inside single quotes). Double-quoted
          # echo expands the date; nothing else needs expansion.
          {
            echo "Weekly outdated-dependency audit (generated by .github/workflows/deps-outdated.yml)."
            echo
            echo "Updated: $(date -u +'%Y-%m-%d %H:%M UTC')"
            echo
            cat outdated.txt
            echo
            echo "How to update:"
            echo "- Safe patch/minor: bun update"
            echo "- Major (review breaking changes): bun update --latest <pkg>"
            echo "- Catalog (pinned): edit root package.json, then bun install"
          } > issue-body.md

      - name: Upsert tracking issue
        if: steps.outdated.outputs.empty == 'false'
        shell: bash
        run: |
          existing=$(gh issue list --search "$ISSUE_TITLE in:title" --state open --json number --jq '.[0].number' || echo "")
          if [ -n "$existing" ]; then
            gh issue edit "$existing" --body-file issue-body.md
          else
            gh issue create --title "$ISSUE_TITLE" --body-file issue-body.md
          fi

      - name: Close issue when all up to date
        if: steps.outdated.outputs.empty == 'true'
        shell: bash
        run: |
          existing=$(gh issue list --search "$ISSUE_TITLE in:title" --state open --json number --jq '.[0].number' || echo "")
          if [ -n "$existing" ]; then
            gh issue close "$existing" --comment "All dependencies are up to date — auto-closing."
          fi
