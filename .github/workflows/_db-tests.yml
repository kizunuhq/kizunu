name: _db-tests (reusable)

# Reusable DB-backed test job (integration or e2e), parameterized by vitest
# project. A `postgres:16-alpine` service container (matching
# deploy/docker-compose.yml) pre-creates `kizunu_test`; we apply migrations
# directly, then run the given project. `global-setup.ts` sees a reachable DB
# and skips its docker-compose bootstrap — so no `db:test:setup`.

on:
  workflow_call:
    inputs:
      project:
        description: vitest project to run (integration | e2e)
        required: true
        type: string
      timeout-minutes:
        description: job timeout
        required: false
        type: number
        default: 20

jobs:
  test:
    name: DB Tests
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.timeout-minutes }}

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: kizunu_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      APP_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/kizunu_test
      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/kizunu_test

    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup

      - name: Apply migrations
        run: bun --filter @kizunu/api db:migrate

      - name: Run ${{ inputs.project }} tests
        shell: bash
        run: |
          set -o pipefail
          bunx vp test --project ${{ inputs.project }} --coverage --reporter github-actions --reporter default 2>&1 | tee coverage-summary.txt

      - uses: ./.github/actions/coverage-summary
        if: always()
        with:
          name: ${{ inputs.project }}-coverage
