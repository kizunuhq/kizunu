name: _unit (reusable)

# Reusable unit tests: the non-DB vitest projects (`unit` + `web`). No service
# containers — these never touch Postgres. Coverage is report-only; the table
# is uploaded for the CI summary comment.

on:
  workflow_call:

jobs:
  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup

      - name: Run unit + web tests
        shell: bash
        run: |
          set -o pipefail
          bunx vp test --project unit --project web --coverage --reporter github-actions --reporter default 2>&1 | tee coverage-summary.txt

      - uses: ./.github/actions/coverage-summary
        if: always()
        with:
          name: unit-coverage
