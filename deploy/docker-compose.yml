# Dev-only stack. Envs are set inline here on purpose — in development there is
# no .env to manage. Each service opts into profiles; `all` brings up
# everything:
#
#   docker compose -f deploy/docker-compose.yml --profile all up      # full stack
#   docker compose -f deploy/docker-compose.yml --profile api up      # api (+ postgres)
#   docker compose -f deploy/docker-compose.yml --profile web up      # web only
#   docker compose -f deploy/docker-compose.yml --profile infra up    # postgres only
#
# api depends_on postgres, so selecting `api` starts postgres too. The Docker
# build target is `dev` (hot-reload stage). Build contexts and bind mounts are
# rooted at `..` (the repo root) because this file lives under deploy/.
services:
  # ---------------------------------------------------------------------------
  # Infrastructure
  # ---------------------------------------------------------------------------

  postgres:
    image: postgres:16-alpine
    container_name: kizunu-postgres
    # `api` is included so `--profile api` is self-sufficient: the API runs
    # drizzle migrations on boot and depends_on this service.
    profiles: ['all', 'infra', 'api']
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: kizunu_dev
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d kizunu_dev']
      interval: 5s
      timeout: 5s
      retries: 10

  # ---------------------------------------------------------------------------
  # Applications
  # ---------------------------------------------------------------------------

  api:
    container_name: kizunu-api
    profiles: ['all', 'api']
    build:
      context: ..
      dockerfile: deploy/api.Dockerfile
      target: dev
    restart: 'no'
    environment:
      NODE_ENV: development
      PORT: '3001'
      APP_URL: http://localhost:3001
      APP_CORS_ORIGINS: http://localhost:3000
      APP_DATABASE_URL: postgresql://postgres:postgres@postgres:5432/kizunu_dev
      APP_SESSION_COOKIE_NAME: kizunu_session
      APP_SESSION_TTL_DAYS: '30'
      APP_SESSION_COOKIE_SECURE: 'false'
      APP_META_VERIFY_TOKEN: dev-verify-token
    volumes:
      - ..:/monorepo
      # Keep the image's linux node_modules; do not let the host's shadow it.
      - /monorepo/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - '3001:3001'

  web:
    container_name: kizunu-web
    profiles: ['all', 'web']
    build:
      context: ..
      dockerfile: deploy/web.Dockerfile
      target: dev
    restart: 'no'
    environment:
      VITE_API_URL: http://localhost:3001
    volumes:
      - ..:/monorepo
      # Preserve the builder's linux node_modules (rollup/tailwind native
      # binaries) against the darwin host mount.
      - /monorepo/node_modules
    ports:
      - '3000:3000'

volumes:
  postgres_data:
