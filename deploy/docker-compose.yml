services:
  postgres:
    image: postgres:16-alpine
    container_name: kizunu-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: kizunu_dev
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d kizunu_dev']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
